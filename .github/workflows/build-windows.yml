name: Build DoubleG Scanner

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: powershell
        run: |
          Set-ExecutionPolicy -Scope Process Bypass
          .\Scripts\Build-Installer.ps1
          Compress-Archive -Path .\Release\win-x64\* `
            -DestinationPath .\Release\DoubleGScanner-portable-win-x64.zip `
            -Force

      - name: Create SHA-256 files
        shell: powershell
        run: |
          $installer = Get-ChildItem .\Release\Installer\*.exe | Select-Object -First 1
          if (-not $installer) { throw "Installer EXE was not produced." }
          $installerHash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash
          "$installerHash  $($installer.Name)" | Out-File `
            ".\Release\Installer\$($installer.Name).sha256.txt" -Encoding ascii

          $portable = ".\Release\DoubleGScanner-portable-win-x64.zip"
          $portableHash = (Get-FileHash $portable -Algorithm SHA256).Hash
          "$portableHash  DoubleGScanner-portable-win-x64.zip" | Out-File `
            ".\Release\DoubleGScanner-portable-win-x64.zip.sha256.txt" -Encoding ascii

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: DoubleGScanner-installer
          path: |
            Release\Installer\*.exe
            Release\Installer\*.sha256.txt

      - name: Upload portable artifact
        uses: actions/upload-artifact@v6
        with:
          name: DoubleGScanner-portable-win-x64
          path: |
            Release\DoubleGScanner-portable-win-x64.zip
            Release\DoubleGScanner-portable-win-x64.zip.sha256.txt

      - name: Publish public GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = @(
            ".\Release\Installer\DoubleGScannerSetup.exe",
            ".\Release\Installer\DoubleGScannerSetup.exe.sha256.txt",
            ".\Release\DoubleGScanner-portable-win-x64.zip",
            ".\Release\DoubleGScanner-portable-win-x64.zip.sha256.txt"
          )

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $assets --clobber
          }
          else {
            gh release create $tag $assets `
              --title "DoubleG Scanner $tag" `
              --generate-notes
          }
